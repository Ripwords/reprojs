# Repro — one-file self-host.
#
# Usage:
#   1. Download this file and .env.example from the repo
#   2. cp .env.example .env  # then edit .env and fill in the required secrets
#   3. docker compose up -d
#   4. Open http://localhost:3000 — the first user to sign up becomes admin
#
# For upgrades: `docker compose pull && docker compose up -d` (the migrator
# runs automatically before the dashboard starts).
#
# For HTTPS / public deploys, put a reverse proxy (Caddy / Nginx) in front —
# see docs/self-hosting/ for recipes.

name: repro

services:
  # ────────────────────────────────────────────────────────────────
  # Database
  # ────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-repro}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required — set it in .env}
      POSTGRES_DB: ${POSTGRES_DB:-repro}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-repro} -d ${POSTGRES_DB:-repro}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ────────────────────────────────────────────────────────────────
  # Migrator — runs drizzle-kit migrate, exits 0. Kept for operators who
  # want explicit migration control or are running a multi-replica
  # deploy. The dashboard service ALSO runs migrations on its own startup
  # (see its command below), so this service is now belt-and-suspenders.
  #
  # Why both: with restart: "no", a successful migrator container caches
  # as Exited(0); on `docker compose up -d` after pulling a new image,
  # compose may reuse the cached container without re-running drizzle-
  # kit migrate against the new image's migrations. The dashboard's own
  # startup migration is idempotent and guarantees the schema matches
  # the running code on every restart.
  # ────────────────────────────────────────────────────────────────
  migrator:
    image: ripwords/reprojs-dashboard:${REPRO_VERSION:-latest}
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-repro}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-repro}
    command: ["bunx", "drizzle-kit", "migrate"]
    restart: "no"

  # ────────────────────────────────────────────────────────────────
  # Optional virus scanner for user-supplied attachments.
  #
  # Disabled in code by default — the dashboard only contacts clamd when
  # INTAKE_USER_FILE_SCAN_ENABLED=true is set in .env. If you don't want
  # this, you can leave the env flag at false and `docker compose up`
  # without the --profile flag will still bring it up but idle (it costs
  # ~1GB RAM + ~500MB on disk for the signature DB), or run `docker
  # compose --profile no-scanner up` to skip the service entirely.
  #
  # No `ports:` block intentionally — clamd is reachable to the dashboard
  # over the internal compose network at clamav:3310. Exposing 3310 to
  # the host would let anyone on the host probe the scanner; not what
  # you want for a self-host.
  # ────────────────────────────────────────────────────────────────
  clamav:
    image: clamav/clamav:stable
    # The official image's arm64 manifest is intermittently absent on
    # Docker Hub. amd64 + emulation works on every host (including Apple
    # Silicon under Rosetta) and the throughput cost on a sidecar that
    # only runs at intake time is negligible. Drop this line on a native
    # arm64 host if you want to skip emulation.
    platform: linux/amd64
    volumes:
      - clamav_db:/var/lib/clamav
    healthcheck:
      test: ["CMD", "clamdscan", "--ping", "1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s
    restart: unless-stopped

  # ────────────────────────────────────────────────────────────────
  # Dashboard — the Nuxt server
  # ────────────────────────────────────────────────────────────────
  dashboard:
    image: ripwords/reprojs-dashboard:${REPRO_VERSION:-latest}
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      # Internal connection string: the one in .env (if any) is overridden so
      # the container always talks to the postgres service above.
      DATABASE_URL: postgres://${POSTGRES_USER:-repro}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-repro}
      # The clamav service name on the compose network. Hardcoded here so
      # `.env` doesn't need a docker-specific override — it just sets
      # INTAKE_USER_FILE_SCAN_ENABLED=true|false.
      CLAMAV_HOST: clamav
      CLAMAV_PORT: "3310"
    volumes:
      # Used when STORAGE_DRIVER=local (the default). Ignored when
      # STORAGE_DRIVER=s3 — attachments go to your S3 bucket instead.
      - attachments_data:/data/attachments
    # Always run drizzle-kit migrate before starting the server. Idempotent —
    # exits in milliseconds when no new migrations exist. Guarantees that
    # an upgraded image cannot end up serving against a stale schema, even
    # if the separate `migrator` service didn't re-run on this `up`.
    command: ["sh", "-c", "bunx drizzle-kit migrate && exec bun .output/server/index.mjs"]
    healthcheck:
      test: ["CMD", "bun", "/app/healthcheck.mjs"]
      interval: 15s
      timeout: 5s
      retries: 5
      # Bumped from 30s — first boot of an upgraded image now also runs
      # migrations during the start window, so give the healthcheck a
      # little more room before failing.
      start_period: 60s
    restart: unless-stopped

volumes:
  postgres_data:
  attachments_data:
  clamav_db:
