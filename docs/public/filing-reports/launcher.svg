<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 280" role="img" aria-label="Diagram of the Repro launcher button at the bottom-right of a webpage">
  <style>
    .page { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1.5; }
    .browser-bar { fill: #e2e8f0; }
    .dot { fill: #94a3b8; }
    .content { fill: #e2e8f0; }
    .launcher { fill: #10b981; }
    .launcher-icon { fill: #fff; }
    .label { font: 600 12px ui-sans-serif, system-ui; fill: #0f172a; }
    .arrow { stroke: #10b981; stroke-width: 2; fill: none; }
  </style>
  <rect class="page" x="20" y="20" width="440" height="240" rx="8"/>
  <rect class="browser-bar" x="20" y="20" width="440" height="28" rx="8"/>
  <rect class="browser-bar" x="20" y="40" width="440" height="8"/>
  <circle class="dot" cx="36" cy="34" r="4"/>
  <circle class="dot" cx="50" cy="34" r="4"/>
  <circle class="dot" cx="64" cy="34" r="4"/>
  <rect class="content" x="40" y="68" width="180" height="14" rx="3"/>
  <rect class="content" x="40" y="92" width="280" height="10" rx="3"/>
  <rect class="content" x="40" y="108" width="260" height="10" rx="3"/>
  <rect class="content" x="40" y="124" width="240" height="10" rx="3"/>
  <rect class="content" x="40" y="160" width="120" height="40" rx="6"/>
  <rect class="content" x="170" y="160" width="120" height="40" rx="6"/>
  <circle class="launcher" cx="425" cy="225" r="22"/>
  <path class="launcher-icon" d="M 415 225 L 423 232 L 435 219" stroke="#fff" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <path class="arrow" d="M 360 200 Q 390 200 410 215" stroke-linecap="round"/>
  <polygon points="406,210 414,217 405,219" fill="#10b981"/>
  <text class="label" x="265" y="195">Click the widget</text>
</svg>
