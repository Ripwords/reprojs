<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 280" role="img" aria-label="Diagram of the annotation toolbar with pen, arrow, rectangle, text, and color tools">
  <style>
    .frame { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1.5; }
    .toolbar { fill: #fff; stroke: #cbd5e1; stroke-width: 1; }
    .tool { fill: #fff; stroke: #cbd5e1; stroke-width: 1; }
    .tool-active { fill: #d1fae5; stroke: #10b981; stroke-width: 1.5; }
    .icon { fill: none; stroke: #0f172a; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
    .icon-active { stroke: #047857; }
    .label { font: 500 10px ui-sans-serif, system-ui; fill: #475569; text-anchor: middle; }
    .preview { fill: #e2e8f0; }
    .anno { fill: none; stroke: #ef4444; stroke-width: 2.5; stroke-linecap: round; }
  </style>
  <rect class="frame" x="20" y="20" width="440" height="240" rx="8"/>
  <rect class="preview" x="40" y="80" width="400" height="160" rx="4"/>
  <ellipse class="anno" cx="180" cy="160" rx="50" ry="25"/>
  <path class="anno" d="M 280 130 L 330 110" />
  <polygon points="328,118 338,108 326,103" fill="#ef4444"/>
  <rect class="toolbar" x="120" y="36" width="240" height="36" rx="18"/>
  <rect class="tool-active" x="130" y="44" width="36" height="20" rx="10"/>
  <path class="icon icon-active" d="M 142 56 L 150 48 M 148 50 L 154 56" />
  <rect class="tool" x="172" y="44" width="36" height="20" rx="10"/>
  <path class="icon" d="M 180 54 L 196 54 M 192 50 L 196 54 L 192 58" />
  <rect class="tool" x="214" y="44" width="36" height="20" rx="10"/>
  <rect class="icon" x="222" y="48" width="14" height="12" rx="1"/>
  <rect class="tool" x="256" y="44" width="36" height="20" rx="10"/>
  <text x="274" y="58" class="label" style="font-weight:700;fill:#0f172a">A</text>
  <circle cx="316" cy="54" r="10" fill="#ef4444" stroke="#cbd5e1"/>
  <text class="label" x="148" y="86">Pen</text>
  <text class="label" x="190" y="86">Arrow</text>
  <text class="label" x="232" y="86">Box</text>
  <text class="label" x="274" y="86">Text</text>
  <text class="label" x="316" y="86">Color</text>
</svg>
