<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 620" width="960" height="620" role="img" aria-labelledby="t">
  <title id="t">Repro Expo SDK — bug-report wizard across three steps: details, annotate, review</title>
  <defs>
    <linearGradient id="flame" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff9b51"/>
      <stop offset="1" stop-color="#f27a1f"/>
    </linearGradient>
    <filter id="shadow" x="-25%" y="-25%" width="150%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#000" flood-opacity="0.45"/>
    </filter>
    <clipPath id="phone-clip">
      <rect x="0" y="0" width="240" height="440" rx="26" ry="26"/>
    </clipPath>
  </defs>

  <!-- Background: mist-950 equivalent so the hero blends into VitePress dark mode
       and reads as an intentional dark promo block in light mode. -->
  <rect width="960" height="620" fill="#1d2530"/>

  <!-- Brand eyebrow -->
  <text x="48" y="56" font-family="ui-monospace,SFMono-Regular,Menlo,monospace"
        font-size="12" letter-spacing="4" fill="url(#flame)" font-weight="700">REPRO · EXPO SDK</text>

  <!-- Title — sans-serif display, generous tracking for a mobile-first headline -->
  <text x="48" y="102" font-family="ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif"
        font-size="36" letter-spacing="-0.8" fill="#f9fafb" font-weight="700">Mobile bug reports, from tap to triage.</text>

  <!-- Subtitle -->
  <text x="48" y="132" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,sans-serif"
        font-size="14" fill="#9ca3af" letter-spacing="0.1">Annotated screenshot · Console &amp; network · Offline queue · 0 runtime deps</text>

  <!-- Phone 1: Form step -->
  <g transform="translate(90,168)" filter="url(#shadow)">
    <rect x="-8" y="-8" width="256" height="456" rx="32" ry="32" fill="#0b0b0b"/>
    <g clip-path="url(#phone-clip)">
      <rect width="240" height="440" fill="#ffffff"/>
      <rect x="92" y="0" width="56" height="16" rx="8" fill="#0b0b0b"/>
      <text x="20" y="50" font-family="ui-sans-serif,system-ui" font-size="9" letter-spacing="2.5" fill="url(#flame)" font-weight="700">REPRO</text>
      <text x="20" y="72" font-family="ui-sans-serif,system-ui" font-size="16" fill="#25343f" font-weight="700">Report a bug</text>
      <circle cx="214" cy="60" r="13" fill="#edf0f1"/>
      <path d="M 209 55 L 219 65 M 219 55 L 209 65" stroke="#6c7a87" stroke-width="2" stroke-linecap="round"/>
      <g transform="translate(20,96)">
        <circle cx="10" cy="10" r="10" fill="url(#flame)"/>
        <text x="10" y="14" text-anchor="middle" font-family="ui-sans-serif,system-ui" font-size="10" fill="#fff" font-weight="700">1</text>
        <rect x="26" y="9" width="48" height="2" rx="1" fill="#dde2e5"/>
        <circle cx="84" cy="10" r="10" fill="#edf0f1"/>
        <text x="84" y="14" text-anchor="middle" font-family="ui-sans-serif,system-ui" font-size="10" fill="#9aa4ae" font-weight="700">2</text>
        <rect x="100" y="9" width="48" height="2" rx="1" fill="#dde2e5"/>
        <circle cx="158" cy="10" r="10" fill="#edf0f1"/>
        <text x="158" y="14" text-anchor="middle" font-family="ui-sans-serif,system-ui" font-size="10" fill="#9aa4ae" font-weight="700">3</text>
      </g>
      <g transform="translate(20,134)" font-family="ui-sans-serif,system-ui" font-size="8" fill="#9aa4ae" letter-spacing="1">
        <text font-weight="600" fill="#25343f">DETAILS</text>
        <text x="74">ANNOTATE</text>
        <text x="148">REVIEW</text>
      </g>
      <line x1="0" y1="154" x2="240" y2="154" stroke="#edf0f1"/>
      <text x="20" y="182" font-family="ui-sans-serif,system-ui" font-size="9" letter-spacing="1.3" fill="#25343f" font-weight="700">TITLE</text>
      <rect x="20" y="192" width="200" height="42" rx="10" fill="#f5f7f8" stroke="#dde2e5"/>
      <text x="32" y="218" font-family="ui-sans-serif,system-ui" font-size="13" fill="#9aa4ae">What went wrong?</text>
      <text x="20" y="258" font-family="ui-sans-serif,system-ui" font-size="9" letter-spacing="1.3" fill="#25343f" font-weight="700">DETAILS</text>
      <text x="72" y="258" font-family="ui-sans-serif,system-ui" font-size="9" fill="#9aa4ae" font-style="italic">optional</text>
      <rect x="20" y="268" width="200" height="88" rx="10" fill="#f5f7f8" stroke="#dde2e5"/>
      <text x="32" y="292" font-family="ui-sans-serif,system-ui" font-size="13" fill="#9aa4ae">Steps to reproduce,</text>
      <text x="32" y="310" font-family="ui-sans-serif,system-ui" font-size="13" fill="#9aa4ae">expected vs actual…</text>
      <rect x="20" y="384" width="200" height="42" rx="12" fill="url(#flame)"/>
      <text x="120" y="410" text-anchor="middle" font-family="ui-sans-serif,system-ui" font-size="13" fill="#fff" font-weight="600">Continue</text>
    </g>
  </g>

  <!-- Phone 2: Annotate step -->
  <g transform="translate(360,168)" filter="url(#shadow)">
    <rect x="-8" y="-8" width="256" height="456" rx="32" ry="32" fill="#0b0b0b"/>
    <g clip-path="url(#phone-clip)">
      <rect width="240" height="440" fill="#ffffff"/>
      <rect x="92" y="0" width="56" height="16" rx="8" fill="#0b0b0b"/>
      <text x="20" y="50" font-family="ui-sans-serif,system-ui" font-size="9" letter-spacing="2.5" fill="url(#flame)" font-weight="700">REPRO</text>
      <text x="20" y="72" font-family="ui-sans-serif,system-ui" font-size="16" fill="#25343f" font-weight="700">Report a bug</text>
      <circle cx="214" cy="60" r="13" fill="#edf0f1"/>
      <path d="M 209 55 L 219 65 M 219 55 L 209 65" stroke="#6c7a87" stroke-width="2" stroke-linecap="round"/>
      <g transform="translate(20,96)">
        <circle cx="10" cy="10" r="10" fill="url(#flame)"/>
        <text x="10" y="14" text-anchor="middle" font-family="ui-sans-serif,system-ui" font-size="10" fill="#fff" font-weight="700">1</text>
        <rect x="26" y="9" width="48" height="2" rx="1" fill="url(#flame)"/>
        <circle cx="84" cy="10" r="10" fill="url(#flame)"/>
        <text x="84" y="14" text-anchor="middle" font-family="ui-sans-serif,system-ui" font-size="10" fill="#fff" font-weight="700">2</text>
        <rect x="100" y="9" width="48" height="2" rx="1" fill="#dde2e5"/>
        <circle cx="158" cy="10" r="10" fill="#edf0f1"/>
        <text x="158" y="14" text-anchor="middle" font-family="ui-sans-serif,system-ui" font-size="10" fill="#9aa4ae" font-weight="700">3</text>
      </g>
      <g transform="translate(20,134)" font-family="ui-sans-serif,system-ui" font-size="8" fill="#9aa4ae" letter-spacing="1">
        <text>DETAILS</text>
        <text x="74" font-weight="600" fill="#25343f">ANNOTATE</text>
        <text x="148">REVIEW</text>
      </g>
      <line x1="0" y1="154" x2="240" y2="154" stroke="#edf0f1"/>
      <g transform="translate(12,166)">
        <rect x="0" y="0" width="32" height="32" rx="7" fill="url(#flame)"/>
        <path d="M 10 22 L 20 12 L 24 16 L 14 26 Z" fill="#fff"/>
        <rect x="38" y="0" width="32" height="32" rx="7" fill="#f5f7f8"/>
        <path d="M 46 16 L 62 16 M 56 10 L 62 16 L 56 22" stroke="#25343f" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <rect x="76" y="0" width="32" height="32" rx="7" fill="#f5f7f8"/>
        <rect x="82" y="6" width="20" height="20" rx="2" stroke="#25343f" stroke-width="1.6" fill="none"/>
        <rect x="114" y="0" width="32" height="32" rx="7" fill="#f5f7f8"/>
        <rect x="118" y="12" width="24" height="8" rx="2" fill="#25343f" opacity="0.55"/>
        <rect x="152" y="0" width="32" height="32" rx="7" fill="#f5f7f8"/>
        <path d="M 160 10 L 176 10 M 168 10 L 168 24" stroke="#25343f" stroke-width="2" stroke-linecap="round"/>
      </g>
      <g transform="translate(18,206)">
        <circle cx="8" cy="8" r="8" fill="#e53935"/>
        <circle cx="8" cy="8" r="10" stroke="url(#flame)" stroke-width="1.5" fill="none"/>
        <circle cx="28" cy="8" r="8" fill="#fb8c00"/>
        <circle cx="48" cy="8" r="8" fill="#fdd835"/>
        <circle cx="68" cy="8" r="8" fill="#43a047"/>
        <circle cx="88" cy="8" r="8" fill="#1e88e5"/>
        <circle cx="140" cy="8" r="2" fill="#25343f"/>
        <circle cx="156" cy="8" r="3" fill="url(#flame)"/>
        <circle cx="174" cy="8" r="4" fill="#25343f"/>
        <circle cx="194" cy="8" r="5" fill="#25343f"/>
      </g>
      <rect x="12" y="238" width="216" height="140" fill="#f5f7f8"/>
      <g transform="translate(20,252)" opacity="0.35">
        <rect width="200" height="10" rx="2" fill="#25343f"/>
        <rect y="22" width="150" height="8" rx="2" fill="#25343f"/>
        <rect y="42" width="200" height="28" rx="4" fill="#25343f"/>
        <rect y="80" width="200" height="28" rx="4" fill="#25343f"/>
      </g>
      <g stroke="#e53935" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.9">
        <rect x="28" y="300" width="170" height="32" rx="3"/>
        <path d="M 54 352 Q 78 340 96 328"/>
        <path d="M 88 332 L 96 328 L 94 336"/>
      </g>
      <rect x="20" y="384" width="60" height="42" rx="12" fill="#edf0f1"/>
      <text x="50" y="410" text-anchor="middle" font-family="ui-sans-serif,system-ui" font-size="13" fill="#6c7a87" font-weight="500">Back</text>
      <rect x="88" y="384" width="132" height="42" rx="12" fill="url(#flame)"/>
      <text x="154" y="410" text-anchor="middle" font-family="ui-sans-serif,system-ui" font-size="13" fill="#fff" font-weight="600">Continue</text>
    </g>
  </g>

  <!-- Phone 3: Review step with inline floating launcher on the phone -->
  <g transform="translate(630,168)" filter="url(#shadow)">
    <rect x="-8" y="-8" width="256" height="456" rx="32" ry="32" fill="#0b0b0b"/>
    <g clip-path="url(#phone-clip)">
      <rect width="240" height="440" fill="#ffffff"/>
      <rect x="92" y="0" width="56" height="16" rx="8" fill="#0b0b0b"/>
      <text x="20" y="50" font-family="ui-sans-serif,system-ui" font-size="9" letter-spacing="2.5" fill="url(#flame)" font-weight="700">REPRO</text>
      <text x="20" y="72" font-family="ui-sans-serif,system-ui" font-size="16" fill="#25343f" font-weight="700">Report a bug</text>
      <circle cx="214" cy="60" r="13" fill="#edf0f1"/>
      <path d="M 209 55 L 219 65 M 219 55 L 209 65" stroke="#6c7a87" stroke-width="2" stroke-linecap="round"/>
      <g transform="translate(20,96)">
        <circle cx="10" cy="10" r="10" fill="url(#flame)"/>
        <rect x="26" y="9" width="48" height="2" rx="1" fill="url(#flame)"/>
        <circle cx="84" cy="10" r="10" fill="url(#flame)"/>
        <rect x="100" y="9" width="48" height="2" rx="1" fill="url(#flame)"/>
        <circle cx="158" cy="10" r="10" fill="url(#flame)"/>
        <text x="158" y="14" text-anchor="middle" font-family="ui-sans-serif,system-ui" font-size="10" fill="#fff" font-weight="700">3</text>
      </g>
      <g transform="translate(20,134)" font-family="ui-sans-serif,system-ui" font-size="8" fill="#9aa4ae" letter-spacing="1">
        <text>DETAILS</text>
        <text x="74">ANNOTATE</text>
        <text x="148" font-weight="600" fill="#25343f">REVIEW</text>
      </g>
      <line x1="0" y1="154" x2="240" y2="154" stroke="#edf0f1"/>
      <rect x="20" y="172" width="200" height="170" rx="14" fill="#f5f7f8" stroke="#dde2e5"/>
      <text x="32" y="194" font-family="ui-sans-serif,system-ui" font-size="9" letter-spacing="1.3" fill="#6c7a87" font-weight="700">INCLUDED IN THIS REPORT</text>
      <g font-family="ui-sans-serif,system-ui" font-size="12" fill="#25343f">
        <circle cx="32" cy="218" r="2.5" fill="url(#flame)"/>
        <text x="42" y="222">Title &amp; description</text>
        <circle cx="32" cy="244" r="2.5" fill="url(#flame)"/>
        <text x="42" y="248">Annotated screenshot</text>
        <text x="200" y="248" text-anchor="end" font-family="ui-monospace,monospace" font-size="11" fill="#6c7a87">3</text>
        <circle cx="32" cy="270" r="2.5" fill="url(#flame)"/>
        <text x="42" y="274">Console, network &amp; breadcrumbs</text>
        <circle cx="32" cy="296" r="2.5" fill="url(#flame)"/>
        <text x="42" y="300">Device &amp; environment info</text>
      </g>
      <rect x="20" y="384" width="60" height="42" rx="12" fill="#edf0f1"/>
      <text x="50" y="410" text-anchor="middle" font-family="ui-sans-serif,system-ui" font-size="13" fill="#6c7a87" font-weight="500">Back</text>
      <rect x="88" y="384" width="132" height="42" rx="12" fill="url(#flame)"/>
      <text x="154" y="410" text-anchor="middle" font-family="ui-sans-serif,system-ui" font-size="13" fill="#fff" font-weight="600">Send report</text>
    </g>
  </g>
</svg>
