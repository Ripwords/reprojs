# DEV ONLY — this compose file is for local development on a single-developer
# machine. It uses default credentials and binds Postgres on all interfaces.
# For production:
#   - Rotate POSTGRES_PASSWORD to a strong secret (inject via env or Docker secrets)
#   - Bind the port to 127.0.0.1 only, or remove the ports: block and access via
#     the internal docker network
#   - Pin image tags to exact digests, not floating major versions
#   - Enable healthchecks + restart: unless-stopped
name: repro
services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: repro
    ports:
      - "127.0.0.1:5436:5432"
    volumes:
      - repro_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d repro"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Optional virus scanner for user-supplied attachments. The dashboard only
  # talks to it when INTAKE_USER_FILE_SCAN_ENABLED=true (off by default), so
  # operators who don't want this can leave it stopped. First boot pulls the
  # signature DB (~500 MB); freshclam updates it daily afterwards.
  #
  # platform: linux/amd64 is pinned because the official clamav/clamav:stable
  # tag's arm64 manifest is intermittently absent (Docker Hub rebuilds drop
  # arm64 occasionally). amd64 + Rosetta works reliably on Apple Silicon and
  # the throughput cost on a sidecar that only runs on intake is negligible.
  # Native arm64 hosts can drop the platform line.
  clamav:
    image: clamav/clamav:stable
    platform: linux/amd64
    ports:
      - "127.0.0.1:3310:3310"
    volumes:
      - repro_clamav_db:/var/lib/clamav
    healthcheck:
      test: ["CMD", "clamdscan", "--ping", "1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    restart: unless-stopped

volumes:
  repro_data:
  repro_clamav_db:
