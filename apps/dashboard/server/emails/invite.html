<!doctype html>
<html>
  <body style="font-family: sans-serif; max-width: 560px; margin: 0 auto; padding: 24px">
    <h2>You've been invited to Feedback Tool</h2>
    <p>Hi,</p>
    <p>
      {{inviterName}} invited you to join Feedback Tool. Click the link below to complete your
      account setup:
    </p>
    <p>
      <a
        href="{{url}}"
        style="
          display: inline-block;
          padding: 12px 18px;
          background: #111;
          color: #fff;
          text-decoration: none;
          border-radius: 6px;
        "
        >Accept invite</a
      >
    </p>
    <p>This invitation expires on {{expiresAt}}.</p>
  </body>
</html>
