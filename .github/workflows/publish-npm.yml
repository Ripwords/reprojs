name: Publish npm package

# Publishes @reprojs/core to npm.
#
# Triggers:
#   - Push of an SDK semver tag (sdk-v*.*.*) → publishes that version
#   - Manual dispatch → republishes whatever is currently in packages/core/package.json
#
# Decoupled from the dashboard's v*.*.* tags so SDK + dashboard can cut
# releases on independent cadences. Use `bun run release:sdk` to bump
# packages/core and tag locally (it runs prerelease checks first).
#
# Secrets (Settings → Secrets and variables → Actions):
#   - NPM_TOKEN : automation token scoped to the @reprojs org. Generate at
#                 https://www.npmjs.com/settings/<you>/tokens with type
#                 "Automation" (bypasses 2FA for CI).
#
# Provenance:
#   - id-token: write on the publish job lets npm attest that this tarball
#     came from this repo+workflow+commit, shown as a verified badge on the
#     package page. Requires the package to be public (it is — publishConfig).

on:
  push:
    tags:
      - "sdk-v*.*.*"
  workflow_dispatch:

permissions:
  contents: read

env:
  BUN_VERSION: 1.3.12

jobs:
  # Mirrors publish-docker's verify job so SDK publishes get the same
  # pre-ship gate. Runs the exact steps as `bun run prerelease`.
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --frozen-lockfile
      - run: bun run fmt:check
      - run: bun run lint
      - run: bun run test:sdk
      - run: bun run sdk:build
      - name: Verify IIFE bundle is self-contained
        run: |
          BUNDLE=packages/core/dist/repro.iife.js
          test -f "$BUNDLE" || { echo "Bundle missing"; exit 1; }
          SIZE=$(wc -c < "$BUNDLE")
          echo "Bundle size: $SIZE bytes"
          if [ "$SIZE" -lt 50000 ]; then
            echo "ERROR: bundle < 50 KB — dependencies were likely tree-shaken out"
            exit 1
          fi
          if grep -q "@reprojs" "$BUNDLE"; then
            echo "ERROR: bundle contains unresolved @reprojs imports"
            exit 1
          fi

  publish:
    name: Publish @reprojs/core
    runs-on: ubuntu-latest
    needs: verify
    permissions:
      contents: read
      id-token: write # required for --provenance
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      # npm is used for the final publish (not bun publish) because npm has
      # first-class --provenance support (OIDC-signed attestations via
      # sigstore). Node is needed so the `npm` CLI is on PATH with a recent
      # version that understands --provenance.
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - run: bun install --frozen-lockfile

      # Rebuild dist/ from source on the CI runner — the package's `files`
      # field only includes dist/, so whatever's on disk at publish time is
      # what ships. Never trust local build artifacts.
      - run: bun run sdk:build

      # Tag-triggered runs must match packages/core's version. Guard against
      # accidentally tagging sdk-v0.2.0 while the package is still at 0.1.x
      # (would publish the wrong version number and/or confuse consumers).
      - name: Check tag matches package version
        if: github.event_name == 'push'
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#sdk-v}"
          PKG_VERSION=$(node -p "require('./packages/core/package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag $GITHUB_REF_NAME expects version $TAG_VERSION but packages/core is at $PKG_VERSION"
            exit 1
          fi

      - name: Publish to npm
        working-directory: packages/core
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public
