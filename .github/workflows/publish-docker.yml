name: Publish Docker image

# Builds and pushes the dashboard image to Docker Hub.
#
# Triggers:
#   - Push of a semver tag (v*.*.*) → publishes versioned + major + major.minor + latest
#   - Manual dispatch → publishes "edge" for testing
#
# amd64-only. ARM via QEMU emulation on x86 runners is 5-10× slower for
# a Nuxt build and almost no self-host target needs it — VPS + Docker
# Desktop on Intel is the common case. If ARM demand shows up, add a
# second matrix leg on `ubuntu-24.04-arm` (native runner) rather than
# emulation.
#
# Requires two repo secrets (Settings → Secrets and variables → Actions):
#   - DOCKERHUB_USERNAME : the Docker Hub login that owns the image
#   - DOCKERHUB_TOKEN    : a Docker Hub access token with Read/Write/Delete on
#                          the `ripwords/reprokit-dashboard` repo

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read

env:
  IMAGE: ripwords/reprokit-dashboard

jobs:
  build:
    name: Build + push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}
            type=raw,value=edge,enable=${{ github.event_name == 'workflow_dispatch' }}
          labels: |
            org.opencontainers.image.title=Repro dashboard
            org.opencontainers.image.description=Self-hostable triage dashboard + intake API for the Repro feedback SDK
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.source=https://github.com/Ripwords/reprokit

      - name: Build + push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/dashboard/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
