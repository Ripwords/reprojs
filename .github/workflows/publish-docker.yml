name: Publish Docker image

# Builds and pushes the dashboard image to Docker Hub.
#
# Triggers:
#   - Push of a semver tag (v*.*.*) → publishes versioned + major + major.minor + latest
#   - Manual dispatch → publishes "edge" for testing
#
# amd64-only. ARM via QEMU emulation on x86 runners is 5-10× slower for
# a Nuxt build and almost no self-host target needs it — VPS + Docker
# Desktop on Intel is the common case. If ARM demand shows up, add a
# second matrix leg on `ubuntu-24.04-arm` (native runner) rather than
# emulation.
#
# Requires two repo secrets (Settings → Secrets and variables → Actions):
#   - DOCKERHUB_USERNAME : the Docker Hub login that owns the image
#   - DOCKERHUB_TOKEN    : a Docker Hub access token with Read/Write/Delete on
#                          the `ripwords/reprojs-dashboard` repo

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read

env:
  IMAGE: ripwords/reprojs-dashboard
  BUN_VERSION: 1.3.12

jobs:
  # Publish-time safety net. Mirrors `bun run prerelease` so a locally-stale
  # release machine can't ship a broken image.
  #
  # The full dashboard integration suite (Postgres + dev server boot) runs in
  # ci.yml on the `push: branches: [main]` event that precedes the tag push,
  # so we don't duplicate it here. If the CI run on main failed, the releaser
  # sees it before tagging and can hold off.
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --frozen-lockfile
      - run: bun run fmt:check
      - run: bun run lint
      - run: bun run test:sdk
      - run: bun run sdk:build
      - name: Verify IIFE bundle is self-contained
        run: |
          BUNDLE=packages/core/dist/repro.iife.js
          test -f "$BUNDLE" || { echo "Bundle missing"; exit 1; }
          SIZE=$(wc -c < "$BUNDLE")
          echo "Bundle size: $SIZE bytes"
          if [ "$SIZE" -lt 50000 ]; then
            echo "ERROR: bundle < 50 KB — dependencies were likely tree-shaken out"
            exit 1
          fi
          if grep -q "@reprojs" "$BUNDLE"; then
            echo "ERROR: bundle contains unresolved @reprojs imports"
            exit 1
          fi

  build:
    name: Build + push
    runs-on: ubuntu-latest
    needs: verify
    permissions:
      contents: write # required for `gh release create`
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}
            type=raw,value=edge,enable=${{ github.event_name == 'workflow_dispatch' }}
          labels: |
            org.opencontainers.image.title=Repro dashboard
            org.opencontainers.image.description=Self-hostable triage dashboard + intake API for the Repro feedback SDK
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.source=https://github.com/Ripwords/reprojs

      - name: Build + push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/dashboard/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Backstop against the v0.1.11/v0.1.12 recovery dance: changelogen's
      # release script runs `gh release create` as its final step, but if the
      # pre-commit hook rejects the generated CHANGELOG (or any other
      # interrupt fires) the release is never created and a recovering
      # operator often forgets the step. Running it here makes the GitHub
      # Release a byproduct of a successful tag push, parallel to npm
      # publish-npm.yml doing the same for SDK releases.
      #
      # Idempotent via --clobber: if the release already exists (operator
      # made it manually during recovery, or this job retried), it's
      # updated rather than failing.
      - name: Create GitHub Release
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          awk '/^## / { if (++n > 1) exit; next } n == 1 { print }' \
            CHANGELOG.md > /tmp/release-notes.body
          if [ ! -s /tmp/release-notes.body ]; then
            echo "warning: could not extract release notes — using placeholder" >&2
            echo "Published dashboard image ripwords/reprojs-dashboard:${TAG}." > /tmp/release-notes.body
          fi
          # VERSION derives from $TAG (github.ref_name, already constrained
          # to v*.*.* by the workflow trigger). No new untrusted input.
          VERSION="${TAG#v}"
          {
            printf '> 🚀 **Repro Dashboard** v%s — self-hostable Docker image: `ripwords/reprojs-dashboard:%s`.\n\n' "$VERSION" "$TAG"
            cat /tmp/release-notes.body
          } > /tmp/release-notes.md
          TITLE="🚀 Dashboard v${VERSION}"
          # Dashboard owns the "Latest" badge (GitHub can only flag one
          # release per repo); SDK and Extension releases pass --latest=false
          # so they don't contest it. Descriptive titles keep all three
          # tracks scannable on the /releases page.
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" \
              --title "$TITLE" \
              --notes-file /tmp/release-notes.md
          else
            gh release create "$TAG" \
              --title "$TITLE" \
              --notes-file /tmp/release-notes.md \
              --latest
          fi
