name: Publish Chrome extension

# Publishes @reprojs/extension to the Chrome Web Store (unlisted listing).
#
# Triggers:
#   - Push of an extension semver tag (extension-v*.*.*) → uploads + publishes
#   - Manual dispatch → re-uploads apps/extension/package.json version (no
#     auto-publish; resubmits for review)
#
# Required GitHub secrets:
#   CWS_EXTENSION_ID, CWS_CLIENT_ID, CWS_CLIENT_SECRET, CWS_REFRESH_TOKEN
# Generated via the one-time chrome-webstore-upload-cli get-refresh-token flow.
# The Chrome Web Store API requires OAuth 2.0 with offline access; GitHub
# OIDC (as used by publish-npm.yml) is not supported by Google's Web Store
# endpoint, so these must be opaque secrets.
#
# Security note: all github.* context values used in `run:` steps are passed
# through env vars, not interpolated directly, to avoid workflow injection.

on:
  push:
    tags:
      - "extension-v*.*.*"
  workflow_dispatch:

permissions:
  contents: read

env:
  BUN_VERSION: 1.3.12

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --frozen-lockfile
      - run: bun run fmt:check
      - run: bun run lint
      - run: bun run ext:test
      - run: bun run ext:build
      - name: Verify extension bundle present
        run: |
          test -f apps/extension/dist/manifest.json || { echo "manifest.json missing"; exit 1; }
          test -f apps/extension/dist/repro.iife.js || { echo "SDK IIFE missing in dist"; exit 1; }
          SIZE=$(wc -c < apps/extension/dist/repro.iife.js)
          echo "SDK IIFE: $SIZE bytes"
          if [ "$SIZE" -lt 50000 ]; then
            echo "ERROR: SDK IIFE < 50 KB — sync-sdk likely copied a stub"
            exit 1
          fi

  publish:
    name: Publish to Chrome Web Store
    runs-on: ubuntu-latest
    needs: verify
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --frozen-lockfile
      - run: bun run ext:build

      - name: Check tag matches package version
        if: github.event_name == 'push'
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          TAG_VERSION="${REF_NAME#extension-v}"
          PKG_VERSION=$(node -p "require('./apps/extension/package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag $REF_NAME expects version $TAG_VERSION but apps/extension is at $PKG_VERSION"
            exit 1
          fi

      - name: Package extension zip
        run: |
          cd apps/extension/dist
          zip -r ../../../repro-tester.zip .
          cd -
          ls -la repro-tester.zip

      - name: Upload to Chrome Web Store
        env:
          EXTENSION_ID: ${{ secrets.CWS_EXTENSION_ID }}
          CLIENT_ID: ${{ secrets.CWS_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CWS_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.CWS_REFRESH_TOKEN }}
        run: |
          bunx chrome-webstore-upload-cli@3 upload \
            --source repro-tester.zip \
            --extension-id "$EXTENSION_ID" \
            --client-id "$CLIENT_ID" \
            --client-secret "$CLIENT_SECRET" \
            --refresh-token "$REFRESH_TOKEN" \
            --auto-publish

      - name: Create GitHub Release
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          awk '/^## / { if (++n > 1) exit; next } n == 1 { print }' \
            apps/extension/CHANGELOG.md > /tmp/release-notes.md
          if [ ! -s /tmp/release-notes.md ]; then
            echo "warning: no CHANGELOG entry — using placeholder body" >&2
            echo "Published @reprojs/extension $TAG to the Chrome Web Store." > /tmp/release-notes.md
          fi
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file /tmp/release-notes.md \
            repro-tester.zip
